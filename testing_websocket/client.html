<!DOCTYPE html>
<html>
<body>
    <h2>Walkie-Talkie Chat 📻</h2>
    <div id="chatBox" style="height: 200px; width: 300px; border: 2px solid gray; margin-bottom: 10px; overflow-y: scroll; padding: 5px;"></div>
    
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        // Set up the walkie-talkie connection
        // IMPORTANT: If your friend is on a different computer, they must change 'localhost' to your computer's IP address!
       const ws = new WebSocket("ws://192.168.137.25:8765");

        // What to do when we hear a message from the headquarters
        ws.onmessage = function(event) {
            let chat = document.getElementById("chatBox");
            chat.innerHTML += "<div><b>Friend:</b> " + event.data + "</div>";
            chat.scrollTop = chat.scrollHeight; // Auto-scroll to bottom
        };

        // What to do when we click "Send"
        function sendMessage() {
            let input = document.getElementById("messageInput");
            ws.send(input.value); // Send to headquarters
            
            // Show our own message on our screen
            let chat = document.getElementById("chatBox");
            chat.innerHTML += "<div><b>You:</b> " + input.value + "</div>";
            input.value = ""; // Clear the typing box
        }
    </script>
</body>
</html>
